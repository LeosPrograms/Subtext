name: Build installers

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install CPU-only PyTorch on Linux/Windows to avoid downloading ~2 GB of
      # CUDA libraries that are not needed for a packaged desktop app.
      - name: Install PyTorch (CPU-only, Linux & Windows)
        if: runner.os != 'macOS'
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      # Cache the downloaded model weights so they are only fetched once per
      # runner OS. The key is fixed because the weights do not change between
      # commits.
      - name: Cache model weights
        id: cache-model
        uses: actions/cache@v4
        with:
          path: model/gpt2
          key: model-gpt2-${{ runner.os }}-v1

      - name: Download model weights
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: python download_model.py

      - name: Build with PyInstaller
        run: pyinstaller subtext.spec

      # ── Platform-specific packaging ──────────────────────────────────────
      # Linux and Windows produce a single standalone file — no packaging needed.
      # macOS produces a .app bundle (a directory), so it must be zipped.

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../Subtext-macos.zip Subtext.app

      # ── Upload build artifacts ───────────────────────────────────────────

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Subtext-linux
          path: dist/Subtext
          retention-days: 30

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Subtext-macos
          path: Subtext-macos.zip
          retention-days: 30

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Subtext-windows
          path: dist\Subtext.exe
          retention-days: 30

  # When a version tag (e.g. v1.2.0) is pushed, create a GitHub Release and
  # attach all three installers automatically.
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Subtext-linux/Subtext-linux.tar.gz
            Subtext-macos/Subtext-macos.tar.gz
            Subtext-windows/Subtext-windows.zip
