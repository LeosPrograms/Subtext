name: Build installers

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install CPU-only PyTorch on Linux/Windows to avoid downloading ~2 GB of
      # CUDA libraries that are not needed for a packaged desktop app.
      - name: Install PyTorch (CPU-only, Linux & Windows)
        if: runner.os != 'macOS'
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      # Cache the downloaded model weights so they are only fetched once per
      # runner OS. The key is fixed because the weights do not change between
      # commits.
      - name: Cache model weights
        id: cache-model
        uses: actions/cache@v4
        with:
          path: model/gpt2
          key: model-gpt2-${{ runner.os }}-v1

      - name: Download model weights
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: python download_model.py

      - name: Build with PyInstaller
        run: pyinstaller subtext.spec
        env:
          # Ensure the macOS build runs on macOS 12+ (Monterey and later).
          # Without this, PyInstaller inherits the runner's SDK version and the
          # app will refuse to launch on any older macOS release.
          MACOSX_DEPLOYMENT_TARGET: "12.0"

      # ── Platform-specific packaging ──────────────────────────────────────

      - name: Package (Linux — AppImage)
        if: runner.os == 'Linux'
        run: |
          # Populate AppDir with the PyInstaller binary
          cp dist/Subtext AppDir/Subtext
          chmod +x AppDir/Subtext AppDir/AppRun

          # Generate a placeholder icon if none exists
          python3 - <<'PYEOF'
          import pathlib, base64
          p = pathlib.Path("AppDir/subtext.png")
          if not p.exists():
              try:
                  from PIL import Image, ImageDraw
                  img = Image.new("RGBA", (256, 256), (30, 30, 46, 255))
                  ImageDraw.Draw(img).ellipse([32,32,224,224], fill=(137,180,250,255))
                  img.save(str(p))
              except ImportError:
                  p.write_bytes(base64.b64decode(
                      "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk"
                      "YPhfDwAChwGA60e6kgAAAABJRU5ErkJggg=="))
          PYEOF

          # Download appimagetool
          curl -fsSL -o appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage

          # Build the AppImage (APPIMAGE_EXTRACT_AND_RUN avoids needing FUSE on the runner)
          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 \
            ./appimagetool.AppImage AppDir Subtext-x86_64.AppImage

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../Subtext-macos.zip Subtext.app

      # ── Upload build artifacts ───────────────────────────────────────────

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Subtext-linux
          path: Subtext-x86_64.AppImage
          retention-days: 30

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Subtext-macos
          path: Subtext-macos.zip
          retention-days: 30

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Subtext-windows
          path: dist\Subtext.exe
          retention-days: 30

  # When a version tag (e.g. v1.2.0) is pushed, create a GitHub Release and
  # attach all three installers automatically.
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Subtext-linux/Subtext-x86_64.AppImage
            Subtext-macos/Subtext-macos.zip
            Subtext-windows/Subtext-windows.zip
